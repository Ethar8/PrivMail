events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:3000;
  }

  upstream frontend {
    # Next.js listens on 3000 inside the container.
    server frontend:3000;
  }

  # ---------------------------------------------------------------------------
  # HTTP (port 80): hard redirect to HTTPS. Nothing is served in plaintext.
  # ---------------------------------------------------------------------------
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ---------------------------------------------------------------------------
  # HTTPS (port 443): TLS terminator + reverse proxy.
  # ---------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    # Uncompromising HSTS incl. preload.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      # Required for cross-origin isolation (SQLite WASM + OPFS).
      add_header Cross-Origin-Opener-Policy same-origin;
      add_header Cross-Origin-Embedder-Policy require-corp;
    }
  }
}

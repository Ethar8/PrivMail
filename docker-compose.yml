version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: privmail-nginx
    restart: unless-stopped
    # The only web entry point. HTTP is redirected to HTTPS.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - privmail-network

  backend:
    build: ./backend
    container_name: privmail-backend
    restart: unless-stopped
    # SMTP/IMAP are mail protocols and must stay reachable from the outside.
    # The HTTP API (3000) is NOT exposed externally – only nginx reaches it
    # over the internal network.
    ports:
      - "${SMTP_PORT:-2525}:2525"
      - "${IMAP_PORT:-2143}:2143"
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/privmail
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - SMTP_PORT=2525
      - IMAP_PORT=2143
      - API_PORT=3000
    volumes:
      - ./data/mail:/var/lib/privmail/mail
      - ./data/queue:/var/lib/privmail/queue
    depends_on:
      - postgres
    networks:
      - privmail-network

  frontend:
    build: ./frontend/web
    container_name: privmail-frontend
    restart: unless-stopped
    # Not exposed externally – only nginx reaches it over the internal network.
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - privmail-network

  postgres:
    image: postgres:16-alpine
    container_name: privmail-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=privmail
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - privmail-network

networks:
  privmail-network:
    driver: bridge
